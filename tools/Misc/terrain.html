<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glitch Meta Neon Hacktivist Adventure</title>
<style>
body { background:#0b0b0b;color:#0affaa;font-family:"Courier New",monospace;margin:0;padding:0;}
header { background:#111;padding:25px;text-align:center;font-size:28px;text-shadow:0 0 8px #0affaa;}
nav { background:#222;padding:12px;text-align:center;}
nav a { color:#0affaa;margin:0 12px;text-decoration:none;cursor:pointer;}
nav a:hover { text-decoration:underline;}
section { padding:25px;border-bottom:1px dotted #0affaa;}
button { background:#0affaa;color:#0b0b0b;border:none;padding:10px;cursor:pointer;font-family:monospace;margin-top:12px;}
button:hover { background:#00cc66; }
pre.hidden, .sub-hidden { display:none; }
.terminal { background:#000;padding:15px;color:#0affaa;font-family:monospace; max-height:300px; overflow-y:auto; border:1px solid #0affaa; white-space:pre-wrap; }
input { width:240px; padding:5px; margin-right:5px; font-family: monospace; }
.glitch { display:inline-block; position:relative; }
</style>
</head>
<body>

<header>⚡ Glitch Meta Neon Hacktivist ⚡</header>

<nav>
<a onclick="showSection('index')">Home</a>
<a onclick="showSection('terminal')">Terminal</a>
<a onclick="showSection('crypt')">Cryptic Layer</a>
</nav>

<section id="index">
<h2>Welcome</h2>
<p>"Solve all layers. Watch the archives glitch as you progress."</p>
</section>

<section id="terminal" class="sub-hidden">
<h2>Terminal</h2>
<p>Type commands to explore lost archives:</p>
<input id="termInput" placeholder="type 'help'">
<button onclick="runTerminal()">Run</button>
<pre id="termOutput" class="terminal"></pre>
</section>

<section id="crypt" class="sub-hidden">
<h2>Cryptic Layer</h2>
<p>Enter the final key to unlock hidden archive:</p>
<input id="cryptInput" placeholder="Enter key">
<button onclick="checkKey()">Unlock</button>
<pre id="cryptMessage" class="hidden"></pre>
</section>

<script>
// Section navigation
function showSection(id){
document.querySelectorAll('section').forEach(s=>s.classList.add('sub-hidden'));
document.getElementById(id).classList.remove('sub-hidden');
window.scrollTo({top:0,behavior:'smooth'});
}

// Puzzle fragments
const base64Fragments = [
btoa("Uifsf jt b tfdsfu ibqqz"), 
btoa("Xibu jt b tfdsfu lopx"),   
btoa("Gbslf dbsf uibu dpef")    
];
const caesarShifts=[1,3,5];
let currentFragment=0;
let puzzleStage=0;
let decodedFragments=[];
let glitchIntensity=0;

// Caesar decoder
function caesarDecode(str, shift){
return str.split('').map(c=>{
let code=c.charCodeAt(0);
if(code>=65 && code<=90) return String.fromCharCode((code-65-shift+26)%26+65);
if(code>=97 && code<=122) return String.fromCharCode((code-97-shift+26)%26+97);
return c;
}).join('');
}

// Scramble words for bonus
function scrambleWords(str){
let arr=str.split(" ");
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}
let scrambledBonus=[];

// Glitch effect function
function applyGlitch(text){
if(glitchIntensity===0) return text;
return text.split('').map(c=>{
if(Math.random()<0.03*glitchIntensity) return String.fromCharCode(33 + Math.floor(Math.random()*94));
else return c;
}).join('');
}

// Terminal
function runTerminal(){
const input=document.getElementById('termInput').value.trim().toLowerCase();
const output=document.getElementById('termOutput');
let msg="";
if(input==="help") msg="Commands: decode, caesar <shift>, next, secret, meta, reorder <indices>, bonus, clear";
else if(input==="decode"){
msg="Decoded Base64 fragment "+(currentFragment+1)+":\n"+atob(base64Fragments[currentFragment]);
puzzleStage=1;
glitchIntensity+=1;
}
else if(input.startsWith("caesar")){
if(puzzleStage<1) msg="Run 'decode' first to get fragment.";
else{
let parts=input.split(" ");
if(parts.length!==2 || isNaN(parts[1])) msg="Usage: caesar <shift>";
else{
let shift=parseInt(parts[1]);
let decoded=caesarDecode(atob(base64Fragments[currentFragment]), shift);
msg="Decoded Caesar fragment:\n"+decoded;
if(shift===caesarShifts[currentFragment]){
msg+="\nCorrect! Use 'next' to proceed.";
puzzleStage=2;
decodedFragments[currentFragment]=decoded;
glitchIntensity+=1;
}
}
}
}
else if(input==="next"){
if(puzzleStage<2) msg="Solve current fragment first using 'caesar <shift>'.";
else{
currentFragment++;
if(currentFragment>=base64Fragments.length){
puzzleStage=3;
scrambledBonus=scrambleWords(decodedFragments.join(" "));
msg="All fragments solved! Run 'secret' for meta message and key hint.";
glitchIntensity+=2;
}
else{ puzzleStage=1; msg="Next Base64 fragment ready. Run 'decode' to view."; glitchIntensity+=1; }
}
}
else if(input==="secret"){
if(puzzleStage<3) msg="Keep decoding all fragments to find final meta message.";
else msg="Meta Message (scrambled for bonus):\n"+applyGlitch(scrambledBonus.join(" "));
}
else if(input.startsWith("reorder")){
if(puzzleStage<3) msg="No meta message yet. Solve all fragments first.";
else{
let indices=input.split(" ").slice(1).map(Number);
if(indices.length!==scrambledBonus.length) msg="Must provide all word indices.";
else{
let reordered=[];
for(let i=0;i<indices.length;i++) reordered.push(scrambledBonus[indices[i]-1]);
scrambledBonus=reordered;
msg="Reordered meta message:\n"+applyGlitch(scrambledBonus.join(" "));
}
}
}
else if(input==="meta"){
if(puzzleStage<3) msg="No meta message yet.";
else msg="Current scrambled meta:\n"+applyGlitch(scrambledBonus.join(" "));
}
else if(input==="bonus"){
if(puzzleStage<3) msg="No meta message yet.";
else if(scrambledBonus.join(" ")===decodedFragments.join(" ")) msg="🎉 Bonus message revealed! Hidden 2000s archive fully reconstructed!";
else msg="Incorrect order. Reorder words correctly using 'reorder <indices>'.";
}
else if(input==="clear") msg="";
else msg="Unknown command. Type 'help'.";
output.textContent=applyGlitch(msg);
}

// Cryptic key unlock
function checkKey(){
const key=document.getElementById('cryptInput').value.toLowerCase();
const msg=document.getElementById('cryptMessage');
if(key==='neonhack'){
msg.textContent="🎉 Ultimate Neon Hacktivist archive unlocked!\nAll Base64, Caesar, Meta, Bonus puzzles solved!\nGlitch intensity maxed out!";
msg.classList.remove('hidden');
}
else alert("Wrong key. Solve all fragments first.");
}
</script>
</body>
</html>
